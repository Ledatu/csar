# CSAR E2E test config
# Routes point to the mockapi container inside Docker network.

listen_addr: ":8080"

coordinator:
  enabled: true
  address: "coordinator:9090"
  allow_insecure: true   # e2e only — no TLS inside Docker network

circuit_breakers:
  e2e_breaker:
    max_requests: 1
    interval: "60s"
    timeout: "200ms"
    failure_threshold: 2

paths:
  # Basic proxy — GET products
  /api/products:
    get:
      x-csar-backend:
        target_url: "http://mockapi:9999/products"

  # POST products
  /api/products/create:
    post:
      x-csar-backend:
        target_url: "http://mockapi:9999/products"

  # Throttled route — 10 RPS, burst 3, max wait 5s
  /api/throttled:
    get:
      x-csar-backend:
        target_url: "http://mockapi:9999/products"
      x-csar-traffic:
        rps: 10.0
        burst: 3
        max_wait: "5s"

  # Tight throttle — 1 RPS, burst 1, max wait 100ms (for timeout test)
  /api/tight:
    get:
      x-csar-backend:
        target_url: "http://mockapi:9999/products"
      x-csar-traffic:
        rps: 1.0
        burst: 1
        max_wait: "100ms"

  # Flaky upstream with circuit breaker (fail_count=2 so it recovers after 2 failures)
  /api/flaky:
    get:
      x-csar-backend:
        target_url: "http://mockapi:9999/flaky?fail_count=2"
      x-csar-resilience:
        circuit_breaker: "e2e_breaker"

  # Slow upstream
  /api/slow:
    get:
      x-csar-backend:
        target_url: "http://mockapi:9999/slow?delay=200ms"

  # Echo headers — for verifying header passthrough
  /api/echo-headers:
    get:
      x-csar-backend:
        target_url: "http://mockapi:9999/echo-headers"

  # Secured route — coordinator delivers encrypted token, router decrypts & injects
  /api/secured:
    get:
      x-csar-backend:
        target_url: "http://mockapi:9999/echo-headers"
      x-csar-security:
        kms_key_id: "e2e-key-1"
        token_ref: "e2e_api_token"
        inject_header: "Authorization"
        inject_format: "Bearer {token}"

  # Secured route with Api-Key injection
  /api/secured-apikey:
    get:
      x-csar-backend:
        target_url: "http://mockapi:9999/echo-headers"
      x-csar-security:
        kms_key_id: "e2e-key-1"
        token_ref: "e2e_extra_token"
        inject_header: "Api-Key"
        inject_format: "{token}"
