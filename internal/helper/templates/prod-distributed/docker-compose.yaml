# CSAR - Production Distributed Docker Compose
# Generated by csar-helper init --profile prod-distributed
#
# This is a starting point for a distributed CSAR deployment.
# Adjust resource limits, networks, and volumes for your environment.

services:
  coordinator:
    image: csar-coordinator:latest
    ports:
      - "9090:9090"
    environment:
      - CSAR_TOKEN_STORE_DSN=${CSAR_TOKEN_STORE_DSN}
    volumes:
      - ./tls:/etc/csar/tls:ro
    command: >
      -listen :9090
      -token-store postgres
      -token-store-dsn ${CSAR_TOKEN_STORE_DSN}
      -tls-cert /etc/csar/tls/coordinator-cert.pem
      -tls-key /etc/csar/tls/coordinator-key.pem
      -tls-ca /etc/csar/tls/ca.pem

  router:
    image: csar:latest
    ports:
      - "8080:8080"
      - "9100:9100"
    depends_on:
      - coordinator
    volumes:
      - ./config.yaml:/etc/csar/config.yaml:ro
      - ./tls:/etc/csar/tls:ro
    command: >
      -config /etc/csar/config.yaml
      -kms-provider ${CSAR_KMS_PROVIDER}
      -health-addr :9100

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: csar
      POSTGRES_USER: csar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-csar_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
