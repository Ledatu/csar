version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly
linters:
  enable:
    # Security
    - gosec

    # Error handling
    - errcheck
    - bodyclose

    # Code quality
    - gocritic
    - govet
    - staticcheck
    - ineffassign
    - unused

    # Style consistency
    - misspell

    # Bugs
    - copyloopvar
    - durationcheck
    - nilerr
    - sqlclosecheck
  settings:
    gosec:
      excludes:
        # G114: net/http server missing timeouts — we set them explicitly.
        - G114
    gocritic:
      enabled-checks:
        - appendCombine
        - boolExprSimplify
        - builtinShadow
        - nilValReturn
        - rangeExprCopy
        - rangeValCopy
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - (net/http.ResponseWriter).Write
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - bodyclose
      - path: \.pb\.go$
        linters:
          - gocritic
          - gosec
          - govet
          - errcheck
          - staticcheck
      - text: "Error return value of .((os\\.)?std(out|err)\\..*|.*Close)"
        linters:
          - errcheck
    paths:
      - third_party$
      - builtin$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
